spring.application.name=sintonya

# ===============================
# DATABASE - POSTGRESQL
# ===============================
spring.datasource.url=jdbc:postgresql://postgres:5432/sintonya_db
spring.datasource.username=sintonya_user
spring.datasource.password=sintonya_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SERVER
# ===============================
server.address=0.0.0.0
server.port=8080

# ===============================
# H2 CONSOLE (DESABILITADO)
# ===============================
spring.h2.console.enabled=false

# ===============================
# SWAGGER / OPENAPI
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=sintonya_user
spring.rabbitmq.password=sintonya_pass

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.web.server.auto-time-requests=true
management.metrics.enable.all=true


otel.logs.exporter=none
otel.service.name=sintonya
otel.traces.exporter=otlp
otel.metrics.exporter=none
otel.exporter.otlp.endpoint=http://otel-collector:4317
otel.exporter.otlp.protocol=grpc